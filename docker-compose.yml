services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

  db:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: nest-pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  sales-service:
    build:
      context: ./sales-service
      dockerfile: Dockerfile
      target: development
    container_name: nest-backend-sales-service
    restart: always
    volumes:
      - ./sales-service:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
      DB_DATABASE: ${SALES_DB_DATABASE}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      - db

  
  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
      target: development
    container_name: nest-backend-billing-service
    restart: always
    volumes:
      - ./billing-service:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
      DB_DATABASE: ${BILLING_DB_DATABASE}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      - db


  shipping-service:
    build:
      context: ./shipping-service
      dockerfile: Dockerfile
      target: development
    container_name: nest-backend-shipping-service
    restart: always
    volumes:
      - ./shipping-service:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
      DB_DATABASE: ${SHIPPING_DB_DATABASE}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      - db

  apigateway:
    build:
      context: ./apigateway
      dockerfile: Dockerfile
      target: development
    container_name: nest-backend-apigateway
    restart: always
    volumes:
      - ./apigateway:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    environment:
      PORT: 4000

volumes:
  pgdata: